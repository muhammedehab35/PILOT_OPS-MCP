global:
  resolve_timeout: 1m

route:
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: "default"

receivers:
  - name: "default"

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["service", "host"]
