global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "demo-app"
    static_configs:
      - targets: ["demo-app:8080"]
    metrics_path: /metrics
    labels:
      service: "payments-api"
      env: "production"
      host: "prod-server-01"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    labels:
      host: "prod-server-01"
